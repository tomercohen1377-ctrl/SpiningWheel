buildscript {
    ext.kotlin_version = "1.9.24"
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.6.0")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version")
    }
}

// For Kotlin 1.9.x the Compose compiler plugin ID is NOT a separate plugin.
// It is integrated into the Kotlin Gradle Plugin and activated by:
//
//     android {
//         buildFeatures { compose = true }
//         composeOptions { kotlinCompilerExtensionVersion = "1.5.14" }
//     }
//
// That's all that's needed for androidx.glance to consume the @Composable
// annotations in our widget UI.

apply plugin: "com.android.library"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "org.jetbrains.kotlin.plugin.serialization"

android {
    // Pull `compileSdkVersion` from the React Native host's root project
    // ext block (`demo-rn-app/android/build.gradle`) so we stay in sync
    // with whatever the host pinned to. If the root didn't set it, fall
    // back to 35.
    compileSdkVersion rootProject.ext.has('compileSdkVersion') \
        ? rootProject.ext.compileSdkVersion \
        : 35
    namespace "com.spinwheel"

    defaultConfig {
        minSdkVersion rootProject.ext.has('minSdkVersion') \
            ? rootProject.ext.minSdkVersion \
            : 24
        targetSdkVersion rootProject.ext.has('targetSdkVersion') \
            ? rootProject.ext.targetSdkVersion \
            : 35
        versionCode 1
        versionName "1.0.4"
        consumerProguardFiles("consumer-rules.pro")
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    buildFeatures {
        // Required by androidx.glance-appwidget (it generates Composable
        // IR at compile time).
        compose = true
    }

    composeOptions {
        // Pinned to Kotlin 1.9.24 — anything in 1.5.x line is compatible.
        kotlinCompilerExtensionVersion "1.5.14"
    }

    packagingOptions {
        resources {
            excludes += ["META-INF/{AL2.0,LGPL2.1}", "META-INF/LICENSE*"]
        }
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    // React Native (provided by the host app at runtime).
    compileOnly "com.facebook.react:react-android"

    // AndroidX core
    implementation "androidx.core:core-ktx:1.13.1"
    implementation "androidx.activity:activity-compose:1.9.0"
    implementation "androidx.annotation:annotation:1.8.2"

    // Jetpack Compose (BoM) + Glance widget runtime.
    def composeBom = platform("androidx.compose:compose-bom:2024.06.00")
    implementation composeBom
    implementation "androidx.compose.ui:ui"
    implementation "androidx.compose.material3:material3"

    implementation "androidx.glance:glance-appwidget:1.1.0"
    implementation "androidx.glance:glance-material3:1.1.0"

    // Lifecycle + DataStore (Glance appwidget-state API).
    implementation "androidx.lifecycle:lifecycle-runtime-ktx:2.8.0"
    implementation "androidx.datastore:datastore-preferences:1.1.1"

    // Networking + serialization (used by RemoteDataSourceImpl + DriveFileResolver).
    implementation "com.squareup.okhttp3:okhttp:4.12.0"
    implementation "org.jetbrains.kotlinx:kotlinx-serialization-json:1.6.3"

    // Coroutines
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-play-services:1.8.1"
}
