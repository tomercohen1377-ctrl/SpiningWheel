# JVM args for the Gradle daemon — bump memory so the React Native +
# autolinked Kotlin library build doesn't run out.
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8

# AndroidX is mandatory for React Native 0.71+.
android.useAndroidX=true

# Kotlin code style.
kotlin.code.style=official

# Android resource shrinker is fine to leave on; minifyEnabled is off
# because AGP 9 + RN 0.76 with Hilt / Glance often produces warnings.
android.enableR8.fullMode=false

# Newer AGP features.
android.nonTransitiveRClass=true

# React Native: enable Hermes (the default since 0.70).
hermesEnabled=true

# React Native: enable the new architecture (Fabric + TurboModules).
newArchEnabled=true
